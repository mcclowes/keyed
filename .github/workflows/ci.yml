name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install tools
        run: brew install swiftformat swiftlint

      - name: Lint
        run: make lint

  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: make generate

      - name: Build and test
        run: make test
