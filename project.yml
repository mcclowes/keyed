name: Keyed
options:
  bundleIdPrefix: com.mcclowes
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES

schemes:
  Keyed:
    build:
      targets:
        Keyed: all
        KeyedTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KeyedTests

targets:
  Keyed:
    type: application
    platform: macOS
    sources:
      - Keyed/Sources
    resources:
      - path: Keyed/Resources/Assets.xcassets
    configFiles:
      Debug: Keyed/Config/Keyed.xcconfig
      Release: Keyed/Config/Keyed.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcclowes.keyed
        MARKETING_VERSION: "0.2.3"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Keyed/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Keyed/Resources/Keyed.entitlements
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  KeyedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Keyed/Tests/KeyedTests
    dependencies:
      - target: Keyed
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mcclowes.keyed.tests
        GENERATE_INFOPLIST_FILE: true
